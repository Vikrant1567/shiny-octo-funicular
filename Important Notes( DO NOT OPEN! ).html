<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Hacked</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      background-color: black;
      color: red;
      font-family: "Courier New", Courier, monospace;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      animation: flash 0.5s infinite;
      overflow: hidden;
      user-select: none;
    }

    h1 {
      font-size: 8vw;
      text-align: center;
      text-shadow: 2px 2px 5px white;
      margin: 0;
    }

    p {
      font-size: 5vw;
      color: white;
      text-align: center;
      margin: 0;
      margin-bottom: 10px;
    }

    #terminal {
      font-size: 4vw;
      color: #00ff00;
      background-color: #000;
      border: 2px solid #00ff00;
      width: 90%;
      height: 40vh;
      overflow-y: auto;
      padding: 10px;
      box-sizing: border-box;
      margin-top: 20px;
    }

    #prank {
      display: none;
      font-size: 6vw;
      color: #00ff00;
      margin-top: 20px;
      animation: fadeIn 2s ease-in;
      text-align: center;
    }

    @keyframes flash {
      0% { background-color: black; }
      50% { background-color: red; }
      100% { background-color: black; }
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
  </style>
</head>
<body onclick="requestFullScreen()">
  <h1 id="main-title">YOU'VE BEEN HACKED</h1>
  <p id="subtitle">All your data belongs to us... 😈</p>
  <div id="terminal"></div>
  <div id="prank">🎉 YOU'VE BEEN PRANKED! 😂</div>

  <script>
    const terminal = document.getElementById("terminal");
    const prank = document.getElementById("prank");
    const title = document.getElementById("main-title");
    const subtitle = document.getElementById("subtitle");
    const body = document.body;

    const messages = [
      "Accessing /sdcard...",
      "Uploading WhatsApp chats...",
      "Disabling Play Protect...",
      "Injecting backdoor.apk...",
      "Spamming your contacts...",
      "Hacking camera...",
      "Encrypting your storage...",
      "Installing spyware...",
      "Virus ACTIVE ☠️"
    ];

    let i = 0;

    function typeLine() {
      if (i < messages.length) {
        terminal.innerHTML += "> " + messages[i] + "<br>";
        terminal.scrollTop = terminal.scrollHeight;
        i++;
        setTimeout(typeLine, 1000);
      }
    }

    function requestFullScreen() {
      const el = document.documentElement;
      if (el.requestFullscreen) el.requestFullscreen();
      else if (el.webkitRequestFullscreen) el.webkitRequestFullscreen();
      else if (el.msRequestFullscreen) el.msRequestFullscreen();
    }

    function vibratePattern() {
      if (navigator.vibrate) {
        navigator.vibrate([200, 100, 200, 100, 500, 100, 100, 100]);
      }
    }

    typeLine();
    vibratePattern();

    setTimeout(() => {
      body.style.animation = "none";
      body.style.backgroundColor = "black";
      title.style.display = "none";
      subtitle.style.display = "none";
      prank.style.display = "block";
      vibratePattern();
    }, 10000); // After 10 seconds

    setTimeout(() => {
      window.location.href = "https://youtu.be/dQw4w9WgXcQ"; // Rickroll
    }, 13000); // After 13 seconds
  </script>
</body>
</html>
